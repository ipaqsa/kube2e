apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .name }}
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - {{ .command | default "echo 'job complete'" | quote }}
