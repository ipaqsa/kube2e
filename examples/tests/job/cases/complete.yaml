name: complete
description: Submit a Job and wait until at least one Pod succeeds

objects:
  hello-job: job

steps:
  - name: submit
    ensure:
      object: hello-job
      values:
        command: "echo 'hello from kube2e'"
    wait:
      target:
        object: hello-job
      timeout: 2m
      conditions:
        - (.status.succeeded // 0) >= 1
