name: complete
description: Submit a Job and wait until at least one Pod succeeds

objects:
  hello-job: job

steps:
  - name: submit
    object: hello-job
    actions:
      - command: Ensure
        values:
          command: "echo 'hello from kube2e'"
      - command: Wait
        timeout: 2m
        conditions:
          - (.status.succeeded // 0) >= 1
