name: lifecycle
description: Create a ConfigMap then bump its version via a patch

objects:
  app-config: configmap

steps:
  - name: create
    ensure:
      object: app-config
      values:
        env: production
        version: "1.0.0"

  - name: bump-version
    patch:
      target:
        object: app-config
      patches:
        - op: replace
          path: /data/version
          value: "2.0.0"
