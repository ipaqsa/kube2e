apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app: {{ .app | default "webapp" }}
spec:
  replicas: {{ .replicas | default 2 }}
  selector:
    matchLabels:
      app: {{ .app | default "webapp" }}
  template:
    metadata:
      labels:
        app: {{ .app | default "webapp" }}
    spec:
      containers:
        - name: app
          image: {{ .image | default "nginx:1.25-alpine" }}
          ports:
            - containerPort: 80
          # Pull a single value out of the ConfigMap into the environment.
          env:
            - name: APP_COLOR
              valueFrom:
                configMapKeyRef:
                  name: {{ .config | default "webapp-config" }}
                  key: APP_COLOR
          # Mount the ConfigMap's index.html as the served site root.
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: content
          configMap:
            name: {{ .config | default "webapp-config" }}
