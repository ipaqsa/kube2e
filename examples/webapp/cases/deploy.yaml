version: v1
name: deploy
description: |
  Stand up a full web application stack — ConfigMap, Deployment, and Service —
  then prove the pieces are wired together: the Service selects the pods, every
  replica logs a ready message, and the ConfigMap is actually mounted and served.
tags:
  - smoke
  - webapp
  - deployment
  - configmap
  - service
  - logs
  - exec
namespace: kube2e-webapp

# Three objects, three templates. The map key is both the Kubernetes resource
# name and the .name injected into each render. Steps wire them together by
# passing the dependency's name through values (config, app).
objects:
  webapp-config: configmap
  webapp: deployment
  webapp-svc: service

steps:
  - name: configure
    # The ConfigMap must exist before the Deployment mounts it.
    ensure:
      object: webapp-config
      values:
        app: webapp
        greeting: "Welcome to kube2e"
        color: teal
        build: "1.0.0"
    assert:
      target:
        object: webapp-config
      conditions:
        - .data.APP_COLOR == "teal"
        - (.data."index.html" | contains("Welcome to kube2e"))

  - name: deploy
    ensure:
      object: webapp
      values:
        app: webapp
        config: webapp-config
        replicas: 2
    wait:
      target:
        object: webapp
      timeout: 2m
      conditions:
        - .status.readyReplicas == .spec.replicas
    assert:
      target:
        object: webapp
      conditions:
        - .status.readyReplicas == 2
        - (.status.unavailableReplicas // 0) == 0

  - name: expose
    ensure:
      object: webapp-svc
      values:
        app: webapp
    # A Service is "current" the moment it gets a ClusterIP, so assert rather
    # than wait. The selector must match the Deployment's pod labels.
    assert:
      target:
        object: webapp-svc
      conditions:
        - .spec.selector.app == "webapp"
        - (.spec.clusterIP != null and .spec.clusterIP != "")

  - name: verify
    # match: all requires EVERY pod's logs to contain the string — a stronger
    # guarantee than "any" when more than one replica is running.
    logs:
      target:
        object: webapp
      container: app
      contains: "start worker process"
      match: all
      timeout: 1m
    # Exec proves the ConfigMap volume is mounted and serving the rendered
    # content, and that the configMapKeyRef env var landed in the container.
    exec:
      target:
        object: webapp
      container: app
      command:
        - sh
        - -c
        - 'grep -q "Welcome to kube2e" /usr/share/nginx/html/index.html && test "$APP_COLOR" = "teal"'
      timeout: 15s
