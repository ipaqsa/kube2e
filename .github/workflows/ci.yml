name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Signed-off-by
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          BASE="$BASE_REF"
          HEAD="$HEAD_REF"

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS=$(git log --no-merges --format='%H' -1 "$HEAD")
          else
            COMMITS=$(git log --no-merges --format='%H' "${BASE}..${HEAD}")
          fi

          MISSING=0
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            body=$(git log -1 --format='%B' "$sha")
            if ! echo "$body" | grep -qE '^Signed-off-by: .+ <[^@]+@[^@]+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer"
              MISSING=1
            fi
          done <<< "$COMMITS"

          [ "$MISSING" -eq 0 ] && echo "DCO check passed."
          exit $MISSING

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Collect coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          color=$(awk -v c="$coverage" 'BEGIN {
            if (c >= 80) print "brightgreen"
            else if (c >= 60) print "yellow"
            else if (c >= 40) print "orange"
            else print "red"
          }')

          mkdir -p .github/badges
          printf '{\n  "schemaVersion": 1,\n  "label": "coverage",\n  "message": "%s%%",\n  "color": "%s"\n}\n' "$coverage" "$color" > .github/badges/coverage.json

          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -s -m "chore: update coverage badge [skip ci]"
          git push

      - name: Run go vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/kube2e

  examples:
    name: Validate examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Dry-run example suites
        run: go run ./cmd/kube2e run ./examples --dry-run

      - name: Dry-run tagged examples
        run: go run ./cmd/kube2e run ./examples --dry-run --tags smoke

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false
